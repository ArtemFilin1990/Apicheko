name = "tgbot"
main = "worker/worker.js"
compatibility_date = "2026-03-10"
workers_dev = true

[vars]
NODE_ENV = "production"
CHECKO_API_URL = "https://api.checko.ru/v2"
WEBHOOK_PATH = "/webhook"
DADATA_API_URL = "https://suggestions.dadata.ru/suggestions/api/4_1/rs"
CACHE_BYPASS = "0"


# Configure real IDs before deploy
[[kv_namespaces]]
binding = "COMPANY_CACHE"
id = "YOUR_COMPANY_CACHE_KV_ID"
preview_id = "YOUR_COMPANY_CACHE_KV_PREVIEW_ID"
