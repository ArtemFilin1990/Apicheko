name = "tgbot"
main = "worker/worker.js"
compatibility_date = "2026-03-10"
workers_dev = true

[vars]
NODE_ENV = "production"
CHECKO_API_URL = "https://api.checko.ru/v2"
WEBHOOK_PATH = "/webhook"
DADATA_API_URL = "https://suggestions.dadata.ru/suggestions/api/4_1/rs"
CACHE_BYPASS = "0"

# KV cache is optional. Add COMPANY_CACHE binding only after creating a real KV namespace.
# Example:
# [[kv_namespaces]]
# binding = "COMPANY_CACHE"
# id = "<real_kv_namespace_id>"
# preview_id = "<real_kv_preview_id>"
